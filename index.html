<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TimeDensity</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ff] min-h-screen overflow-x-hidden">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-black/85 backdrop-blur-xl border-b border-white/10 py-4">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <span class="text-4xl md:text-5xl font-bold tracking-tight bg-gradient-to-r from-purple-400 to-white bg-clip-text text-transparent">
        TimeDensity
      </span>
      <div class="flex gap-3">
        <button class="lang-btn">RU</button>
        <button class="lang-btn">EN</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="py-12 md:py-16">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-4xl md:text-6xl font-bold text-center mb-12 bg-gradient-to-r from-purple-400 via-indigo-400 to-purple-300 bg-clip-text text-transparent">
        Разделы TimeDensity
      </h1>

      <!-- Сетка карточек -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 py-8">
        <a href="timedensity-model.pdf" download class="level-btn">
          <div class="flex flex-col items-center justify-center gap-3">
            <span class="text-6xl">📄</span>
            <span class="text-xl font-semibold">Скачать PDF</span>
            <span class="text-sm text-gray-400 mt-1">Вся модель TimeDensity</span>
          </div>
        </a>

        <a href="theory.html" class="level-btn">
          <div class="flex flex-col items-center justify-center gap-3">
            <span class="text-6xl">●</span>
            <span class="text-xl font-semibold">Теория</span>
            <span class="text-sm text-gray-400 mt-1">Основные принципы</span>
          </div>
        </a>

        <a href="model.html" class="level-btn">
          <div class="flex flex-col items-center justify-center gap-3">
            <span class="text-6xl">🪶</span>
            <span class="text-xl font-semibold">Модель</span>
            <span class="text-sm text-gray-400 mt-1">Рабочая модель</span>
          </div>
        </a>

        <!-- Остальные карточки — просто скопируй аналогично, если их много -->

        <a href="cosmology.html" class="level-btn">
          <div class="flex flex-col items-center justify-center gap-3">
            <span class="text-6xl">🔥</span>
            <span class="text-xl font-semibold">Космология</span>
            <span class="text-sm text-gray-400 mt-1">Вселенная и время</span>
          </div>
        </a>

        <!-- ... и так далее для всех 12, если хочешь полный список — скажи, вставлю -->
      </div>
    </div>
